[Extras]
    version = 5.0

    # File path of loop data file.  If not a full path,
    # it will be interpreted as relative to this skin's HTML_ROOT.
    loop_data_file = '../loop-data.txt'

    # Seconds between loop-data polls.  Match weewx-loopdata's write
    # cadence (2 seconds for the Vantage driver).
    refresh_rate = 2

    # Timezone for every time shown on the page (rise/set cells, day strip,
    # clock).  By default the STATION's timezone is auto-detected at report
    # generation time, so remote viewers of a public page see station time
    # -- no setting needed.  Uncomment only to override: an IANA name
    # (e.g., 'America/New_York') forces that zone; 'browser' forces the
    # viewer's browser-local timezone.
    # time_zone = 'browser'

    # Choose your own password.  without ?page_update_pwd='xxx'
    # at the end of the URL, auto updating will timeout.
    # Note: This password will be viaible to users looking
    # at page source in their browser.
    page_update_pwd = 'foobar'

    # Page expiration time is the number of hours the report will request
    # loop data and update.  After which, a mouse click will be needed
    # to start refreshing again.  Default 24 hours.
    expiration_time = 24

[CheetahGenerator]
    encoding = html_entities
    # $sky_page for the sky-chart panels.  Deliberately a shim in this
    # extension (NOT user.wxskyfield_sky.SkyfieldSky directly): WeeWX aborts
    # a report whose search_list_extensions fail to import, and weewx-skyfield
    # is optional.  The shim serves the real sky page when weewx-skyfield is
    # installed, and sky_page = None (install hints) when it is not.
    search_list_extensions = user.celestial.CelestialSkyPage
    [[ToDate]]
        [[[index]]]
            template = index.html.tmpl

[CopyGenerator]
    copy_once = celestial.css
    copy_always = ,

[Generators]
        generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator
